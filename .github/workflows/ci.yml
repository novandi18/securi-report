name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write

jobs:
  # ─── Lint, Type-check & Build ────────────────────────────
  build:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (production)
        run: npm run build
        env:
          # Minimal env vars for build to succeed
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          AUTH_SECRET: ci-build-secret
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_ADMIN_KEY: ci-key
          NEXT_PUBLIC_MEILISEARCH_HOST: http://localhost:7700
          NEXT_PUBLIC_MEILISEARCH_SEARCH_KEY: ci-search-key

  # ─── Security Audit ─────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true

  # ─── CodeQL Analysis (OWASP 2025 Compliance) ────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # OWASP 2025 coverage via security-extended query suite

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─── Docker Build Test ──────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: securi-report:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
